services:
  chatgpt2api:
    image: ${CHATGPT2API_IMAGE:-chatgpt2api:local}
    pull_policy: ${CHATGPT2API_PULL_POLICY:-never}
    container_name: chatgpt2api
    restart: unless-stopped
    env_file:
      - ${CHATGPT2API_ENV_FILE:-../.env}
    volumes:
      - ${CHATGPT2API_DATA_DIR:-../data}:/app/data
      - ${CHATGPT2API_ENV_FILE:-../.env}:/app/.env
    networks:
      - proxy_network

networks:
  proxy_network:
    external: true
    name: ${CHATGPT2API_DOCKER_NETWORK:-newapi_default}
