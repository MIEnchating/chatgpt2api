name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.13

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Clear Bun cache
        run: bun pm cache rm || true

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: internal/web/dist/
          retention-days: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'

      - name: Configure git for Go modules
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Test backend
        run: go test ./...

      - name: Validate Docker deployment files
        run: |
          test -f Dockerfile
          test -f Dockerfile.release
          test -f Dockerfile.dockerignore
          test -f docker-compose.yml
          test ! -e Dockerfile.dev
          test ! -e Dockerfile.dev.dockerignore
          test ! -e ubuntu-deploy.sh
          test ! -e docker-build-limited.sh
          test ! -e .dockerignore
          test ! -e Dockerfile.goreleaser
          test ! -e docker-compose.build.yml
          test ! -e docker-compose.local.yml
          test ! -e .goreleaser.simple.yaml
          cp .env.example .env
          docker compose -f docker-compose.yml config >/dev/null
          rm .env
