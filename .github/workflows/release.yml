name: Release
run-name: ${{ github.event.inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: mienvirtuoso
  BUN_VERSION: 1.3.13
  NODE_VERSION: 22

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve and validate release tag
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="$INPUT_TAG"
          else
            TAG_NAME="$GITHUB_REF_NAME"
          fi
          if [[ ! "$TAG_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag must be a stable semantic version such as v1.2.3: $TAG_NAME" >&2
            exit 1
          fi
          TAG_COMMIT="$(git rev-parse "refs/tags/$TAG_NAME^{commit}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "Checked out commit does not match release tag $TAG_NAME" >&2
            exit 1
          fi
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Lint frontend
        working-directory: web
        run: bun run lint

      - name: Test frontend
        working-directory: web
        run: bun run test

      - name: Build frontend
        working-directory: web
        run: bun run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: internal/web/dist/
          retention-days: 1

  release:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: chatgpt2api
          POSTGRES_USER: chatgpt2api
          POSTGRES_PASSWORD: chatgpt2api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chatgpt2api -d chatgpt2api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: chatgpt2api
          MYSQL_USER: chatgpt2api
          MYSQL_PASSWORD: chatgpt2api
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uchatgpt2api -pchatgpt2api --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.build-frontend.outputs.release_tag }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'

      - name: Check backend formatting
        run: |
          unformatted="$(git ls-files -z '*.go' | xargs -0 -r gofmt -l)"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Test backend
        run: go test ./...

      - name: Vet backend
        run: go vet ./...

      - name: Race test stateful backend packages
        run: go test -race ./internal/storage ./internal/service ./internal/httpapi

      - name: Test PostgreSQL and MySQL storage backends
        env:
          CHATGPT2API_TEST_POSTGRES_DATABASE_URL: postgresql://chatgpt2api:chatgpt2api@127.0.0.1:5432/chatgpt2api?sslmode=disable
          CHATGPT2API_TEST_MYSQL_DATABASE_URL: mysql://chatgpt2api:chatgpt2api@127.0.0.1:3306/chatgpt2api
        run: go test ./internal/storage -run '^TestDatabaseBackendIntegration$' -count=1 -v

      - name: Verify Docker Hub credentials
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing required Actions secret: DOCKERHUB_TOKEN" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        env:
          TAG_NAME: ${{ needs.build-frontend.outputs.release_tag }}
        run: |
          BODY="$(git tag -l --format='%(contents)' "$TAG_NAME")"
          DELIMITER="TAG_BODY_$(date +%s)_$RANDOM"
          {
            echo "body<<$DELIMITER"
            printf '%s\n' "$BODY"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.meta.outputs.body }}
