services:
  chatgpt2api:
    image: ${CHATGPT2API_IMAGE:-mienvirtuoso/chatgpt2api:latest}
    container_name: chatgpt2api
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    networks:
      - proxy_network

networks:
  proxy_network:
    external: true
    name: ${CHATGPT2API_DOCKER_NETWORK:-newapi_default}
